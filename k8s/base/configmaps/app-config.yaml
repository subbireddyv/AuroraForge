apiVersion: v1
kind: ConfigMap
metadata:
  name: auroraforge-common
  namespace: auroraforge
  labels:
    app.kubernetes.io/part-of: auroraforge
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9093,kafka-3:9094"
  SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
  OTEL_EXPORTER_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_VERSION: "1.0.0"
  JAVA_TOOL_OPTIONS: >-
    --enable-preview
    -XX:+UseZGC
    -XX:MaxRAMPercentage=75.0
    -Dfile.encoding=UTF-8
    -Djava.security.egd=file:/dev/./urandom
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auroraforge-auth-config
  namespace: auroraforge
  labels:
    app.kubernetes.io/part-of: auroraforge
    app.kubernetes.io/component: auth
data:
  AUTH_PORT: "8085"
  JWT_ACCESS_EXPIRY: "900"
  JWT_REFRESH_EXPIRY: "86400"
  JWT_RSA_GENERATE: "false"
  BCRYPT_STRENGTH: "12"
  RATE_LIMIT_TPM: "60"
  RATE_LIMIT_BURST: "10"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auroraforge-ingestion-config
  namespace: auroraforge
  labels:
    app.kubernetes.io/part-of: auroraforge
    app.kubernetes.io/component: ingestion
data:
  SERVER_PORT: "8081"
  MANAGEMENT_PORT: "8091"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auroraforge-processing-config
  namespace: auroraforge
  labels:
    app.kubernetes.io/part-of: auroraforge
    app.kubernetes.io/component: processing
data:
  SERVER_PORT: "8082"
  MANAGEMENT_PORT: "8092"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auroraforge-sync-config
  namespace: auroraforge
  labels:
    app.kubernetes.io/part-of: auroraforge
    app.kubernetes.io/component: sync
data:
  SERVER_PORT: "8083"
  MANAGEMENT_PORT: "8093"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auroraforge-keymgmt-config
  namespace: auroraforge
  labels:
    app.kubernetes.io/part-of: auroraforge
    app.kubernetes.io/component: keymgmt
data:
  SERVER_PORT: "8084"
  MANAGEMENT_PORT: "8094"
