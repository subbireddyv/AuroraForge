apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auroraforge-ingestion-hpa
  namespace: auroraforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auroraforge-ingestion
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300     # 5-min cooldown prevents flapping
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auroraforge-processing-hpa
  namespace: auroraforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auroraforge-processing
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600     # Kafka Streams rebalance is expensive — slow scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auroraforge-sync-hpa
  namespace: auroraforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auroraforge-sync
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auroraforge-auth-hpa
  namespace: auroraforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auroraforge-auth
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
