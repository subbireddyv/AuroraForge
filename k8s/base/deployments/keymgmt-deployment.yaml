apiVersion: apps/v1
kind: Deployment
metadata:
  name: auroraforge-keymgmt
  namespace: auroraforge
  labels:
    app.kubernetes.io/name: auroraforge-keymgmt
    app.kubernetes.io/part-of: auroraforge
    app.kubernetes.io/component: keymgmt
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: auroraforge-keymgmt
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auroraforge-keymgmt
        app.kubernetes.io/part-of: auroraforge
        app.kubernetes.io/component: keymgmt
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8094"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: auroraforge-keymgmt
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: keymgmt
          image: auroraforge/auroraforge-keymgmt:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
            - name: actuator
              containerPort: 8094
              protocol: TCP
          envFrom:
            - configMapRef:
                name: auroraforge-common
            - configMapRef:
                name: auroraforge-keymgmt-config
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auroraforge-db-secret
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8094
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8094
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /logs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
