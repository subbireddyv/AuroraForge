apiVersion: apps/v1
kind: Deployment
metadata:
  name: auroraforge-processing
  namespace: auroraforge
  labels:
    app.kubernetes.io/name: auroraforge-processing
    app.kubernetes.io/part-of: auroraforge
    app.kubernetes.io/component: processing
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: auroraforge-processing
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auroraforge-processing
        app.kubernetes.io/part-of: auroraforge
        app.kubernetes.io/component: processing
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8092"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: auroraforge-processing
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 120   # Kafka Streams needs time to rebalance
      containers:
        - name: processing
          image: auroraforge/auroraforge-processing:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
            - name: actuator
              containerPort: 8092
              protocol: TCP
          envFrom:
            - configMapRef:
                name: auroraforge-common
            - configMapRef:
                name: auroraforge-processing-config
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8092
            initialDelaySeconds: 90        # Streams topology startup takes longer
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8092
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /logs
            - name: kafka-streams-state
              mountPath: /var/lib/kafka-streams
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: kafka-streams-state
          emptyDir: {}               # RocksDB state is rebuilt from changelog on restart
