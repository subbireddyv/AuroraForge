# =============================================================================
# Namespaces – AuroraForge workload isolation
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: auroraforge
  labels:
    app.kubernetes.io/part-of: auroraforge
    # Pod Security Standards: enforce restricted policy in prod
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
apiVersion: v1
kind: Namespace
metadata:
  name: auroraforge-monitoring
  labels:
    app.kubernetes.io/part-of: auroraforge
    pod-security.kubernetes.io/enforce: baseline

---
# Network Policy: default-deny all ingress/egress, then selectively allow
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: auroraforge
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]

---
# Allow egress to DNS (CoreDNS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: auroraforge
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Allow inter-pod communication within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: auroraforge
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auroraforge
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auroraforge

---
# Allow monitoring namespace to scrape metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: auroraforge
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auroraforge-monitoring
      ports:
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP
