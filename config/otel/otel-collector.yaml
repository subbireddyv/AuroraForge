# =============================================================================
# OpenTelemetry Collector Configuration
#
# Fan-out architecture:
#  Receivers: OTLP (gRPC + HTTP), Prometheus scrape, Kafka metrics
#  Processors: batch, memory_limiter, resource detection, attribute enrichment
#  Exporters: Prometheus (metrics), Jaeger (traces), Loki (logs),
#             + cloud-specific exporters in production overlays
# =============================================================================

receivers:
  # Primary ingestion: Spring Boot services export via OTLP
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]

  # Scrape Prometheus metrics from services that expose /actuator/prometheus
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector-self
          scrape_interval: 30s
          static_configs:
            - targets: [localhost:8888]

        - job_name: kafka
          scrape_interval: 30s
          static_configs:
            - targets:
                - kafka-1:9999
                - kafka-2:9999
                - kafka-3:9999

        - job_name: spark-master
          scrape_interval: 30s
          static_configs:
            - targets: [spark-master:8080]

        - job_name: postgresql
          scrape_interval: 30s
          static_configs:
            - targets: [postgresql:9187]   # postgres-exporter sidecar

  # JVM metrics from Spring Boot (via Micrometer → OTLP push)
  # Supplemented by host-level resource metrics
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
      disk:
      network:
      filesystem:

processors:
  # Memory limiter must be first: protects the collector from OOM
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

  # Batch: improves throughput by grouping signals before export
  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Resource detection: auto-discovers cloud provider, Kubernetes metadata
  resourcedetection:
    detectors: [env, docker, system]
    override: false
    timeout: 5s

  # Add AuroraForge-specific attributes to every signal
  attributes:
    actions:
      - key: service.namespace
        value: auroraforge
        action: upsert
      - key: deployment.environment
        from_attribute: DEPLOYMENT_ENV
        action: insert

  # K8s attribute enrichment – pod name, namespace, node, container image
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.container.name
        - k8s.pod.start_time
      labels:
        - tag_name: app
          key: app
          from: pod
        - tag_name: version
          key: app.kubernetes.io/version
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: connection

  # Filter out health check spans (noise reduction)
  filter:
    traces:
      span:
        - 'attributes["http.url"] == "/actuator/health"'
        - 'attributes["http.route"] == "/health"'
        - 'attributes["http.route"] == "/metrics"'

  # Tail-sampling: keep 100% of error traces, sample 10% of success traces
  tail_sampling:
    decision_wait: 30s
    num_traces: 50000
    expected_new_traces_per_sec: 500
    policies:
      - name: errors-policy
        type: status_code
        status_code: { status_codes: [ERROR] }
      - name: slow-traces-policy
        type: latency
        latency: { threshold_ms: 2000 }
      - name: probabilistic-policy
        type: probabilistic
        probabilistic: { sampling_percentage: 10 }

exporters:
  # Prometheus: exposes scraped + collected metrics at :8889/metrics
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: auroraforge
    send_timestamps: true
    metric_expiration: 5m
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true

  # Jaeger for distributed traces (local dev)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Debug exporter – disabled in prod (set verbosity: detailed for troubleshooting)
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

  # Loki for structured logs (when Loki is added to the stack)
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true
    default_labels_enabled:
      exporter: false
      job: true
      instance: false
      level: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/"
    check_collector_pipeline:
      enabled: true
      interval: 5m
      exporter_failure_threshold: 5

  pprof:
    endpoint: 0.0.0.0:1888

  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  telemetry:
    logs:
      level: info
      encoding: json
    metrics:
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resourcedetection, k8sattributes, attributes, filter, tail_sampling, batch]
      exporters:  [otlp/jaeger, debug]

    metrics:
      receivers:  [otlp, prometheus, hostmetrics]
      processors: [memory_limiter, resourcedetection, k8sattributes, attributes, batch]
      exporters:  [prometheus, debug]

    logs:
      receivers:  [otlp]
      processors: [memory_limiter, resourcedetection, k8sattributes, attributes, batch]
      exporters:  [loki, debug]
