# Redis Sentinel Configuration for AuroraForge local development
# Monitors the redis master declared in docker-compose.yml
# Three sentinel instances must agree before triggering failover (quorum=2)

port 26379
daemonize no
logfile ""
loglevel notice

# Monitor the primary Redis instance
# Format: sentinel monitor <master-name> <ip> <port> <quorum>
sentinel monitor auroraforge-redis redis 6379 2

# Auth password for the monitored master
sentinel auth-pass auroraforge-redis redis_dev_password

# Consider master down if no response within 5 seconds
sentinel down-after-milliseconds auroraforge-redis 5000

# Only one replica can synchronize with the new master at a time during failover
sentinel parallel-syncs auroraforge-redis 1

# Minimum time between failovers for the same master (milliseconds)
sentinel failover-timeout auroraforge-redis 10000

# Notification script (optional): sentinel notification-script auroraforge-redis /path/to/notify.sh

# Scripts executed before and after failover (optional):
# sentinel client-reconfig-script auroraforge-redis /path/to/reconfig.sh

# Announce the sentinel's external IP/port for Docker network discovery
# sentinel announce-ip 127.0.0.1
# sentinel announce-port 26379
