# =============================================================================
# Azure ProviderConfig – uses Workload Identity (federated credentials)
# The Crossplane controller SA is federated with the AKS OIDC issuer.
# No client secrets stored in the cluster.
# =============================================================================
apiVersion: azure.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: auroraforge-azure
  annotations:
    crossplane.io/description: "Primary Azure provider config using Workload Identity"
spec:
  credentials:
    source: OIDCTokenFile
    # The provider reads the projected token from the standard K8s token path.
    # Requires the controller pod to have Workload Identity annotations:
    #   azure.workload.identity/client-id: <AZURE_CLIENT_ID>
    #   azure.workload.identity/use: "true"
